// nosimage.proto defines a specification of OpenConfig support provided by a
// particular network operating system image.

syntax = "proto3";

package openconfig.profiles.nosimage;

import "github.com/openconfig/featureprofiles/proto/testregistry.proto";
import "github.com/openconfig/featureprofiles/proto/metadata.proto";
import "github.com/openconfig/featureprofiles/proto/ocpaths.proto";
import "github.com/openconfig/featureprofiles/proto/ocrpcs.proto";

import "github.com/openconfig/ondatra/proto/testbed.proto";
import "google/protobuf/timestamp.proto";

// Represents a single Platform Configuration Register (PCR) and its expected
// value(s).
message PlatformConfigurationRegister {
  // The PCR index number (e.g., 0, 4, 5, 7). The meaning of the index
  // is vendor-specific.
  int32 index = 1;

  // The expected hash value(s) for this PCR index.
  // This is often a SHA hash represented as a hexadecimal string.
  // Using a repeated field allows for cases where multiple values are
  // considered valid for a given index and software version.
  repeated string values = 2;

  // Optional: A human-readable name or description for this PCR index,
  // which can provide vendor-specific context (e.g., "BIOS", "Aboot Image",
  // "EOS Image").
  string name = 3;
}

// Defines the release type of the network operating system image.
enum ImageType {
  IMAGETYPE_UNSPECIFIED = 0;  // Default value
  IMAGETYPE_GA = 1;           // General Availability
  IMAGETYPE_EFT = 2;          // Early Field Trial
}

// NOSImageProfile - A network operating system and version which provides
// support for a list of OpenConfig paths and RPCs.
message NOSImageProfile {
  // The vendor for the image.
  ondatra.Device.Vendor vendor_id = 1;

  // The name of the vendor's network operating system.
  // This should be the same string as output by
  // /components/component/state/mfg-name from the component
  // TYPE=OPERATING_SYSTEM.
  string nos = 2;

  // Vendor network operating system version.
  // This should match the output of the OpenConfig Path
  // /system/state/software-version.
  string software_version = 3;

  // The name of the vendor's networking hardware device that is compatible with
  // the NOS software version.
  string hardware_name = 7;

  // The date the network operating system is released.
  // The date could be a value in the future indicating a future release.
  google.protobuf.Timestamp release_date = 4;

  // OpenConfig Paths supported by the network operating system.
  openconfig.ocpaths.OCPaths ocpaths = 5;

  // OpenConfig RPCs supported by the network operating system.
  openconfig.ocrpcs.OCRPCs ocrpcs = 6;

  // featureprofile_test_result contains a list of tests which
  // were executed on the NOS software was tested against
  repeated FeatureProfileTestResult featureprofile_test_result = 8;

  // Expected Platform Configuration Register values for this NOS image.
  // Vendors should populate this with the PCR indices and expected values
  // for the given software_version and hardware_name.
  repeated PlatformConfigurationRegister pcrs = 9;

  // Specifies the type of the image release.
  ImageType image_type = 10;
}

message FeatureProfileTestResult {
  // The unique identifier for a featureprofiles test plan.  This string must
  // match the Metadata plan_id defined for the referenced test.
  string plan_id = 1;

  // The git commit hash for the featureprofiles repository containing the
  // referenced test
  string commit = 2;

  // result identifies if the test was executed and its outcome
  enum Result {
    UNKNOWN = 0;
    PASSED = 1;
    FAILED = 2;
    NOT_EXECUTED = 3;
  }
  Result result = 3;
}
